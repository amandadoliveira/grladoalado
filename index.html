<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR Lado a Lado</title>
    <link rel="stylesheet" href="Estilo.css">
</head>
<body>
    <div class="container">
        <div class="left-column">
            <h1>GR Lado a Lado</h1>
            <img src="https://raw.githubusercontent.com/amandadoliveira/grladoalado/main/GR_Lado_a_Lado.png" alt="Igreja A Ponte BH">
        </div>
        <div class="right-column">
            <h2>Cadastre-se</h2>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                    <div class="error" id="nomeError"></div>
                </div>
                <div class="form-group">
                    <label for="aniversario">Data de aniversário</label>
                    <input type="date" id="aniversario" name="aniversario" required>
                    <div class="error" id="aniversarioError"></div>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" required>
                    <div class="error" id="telefoneError"></div>
                </div>
                <button type="submit">Enviar</button>
            </form>
            <div class="success-message" id="successMessage">Cadastro realizado com sucesso!</div>
        </div>
    </div>
    <script src="script.js">
    </script>
</body>
</html>
